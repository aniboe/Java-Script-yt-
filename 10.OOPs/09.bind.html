<script>
    class React{
        constructor(){
            this.library = "react"
            this.server = "server started at localhost"

            // reuirement
            document.querySelector('button')
            .addEventListener("click", this.handelClick) //  this does make the click work but the "handelClick" functio doesnt get context to the content indide React constructor function
            .addEventListener("click", this.handelClick.bind(this)) // by binding the context function is able to get access to the context
        }
        handelClick(){
            console.log("button clicked");
            console.log(this);
            console.log(this.server);
        }
    }
    const app = new React()
</script>
